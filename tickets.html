<head>

  <script>
    window.Swal = {
      fire: function(arg1, arg2, arg3) {
        return new Promise((resolve) => {
          let opts = {};
          if (typeof arg1 === 'string') {
            opts = { title: arg1, text: arg2, icon: arg3 };
          } else {
            opts = arg1;
          }
          
          let timerId;
          let closeModal = function() {
            if (timerId) clearTimeout(timerId);
            if (opts.willClose) opts.willClose();
            overlay.classList.remove('show');
            setTimeout(() => overlay.remove(), 300);
          };
          
          const overlay = document.createElement('div');
          overlay.className = 'glass-swal-overlay';
          
          if (opts.allowOutsideClick !== false) {
            overlay.addEventListener('click', (e) => {
              if (e.target === overlay) {
                closeModal();
                resolve({ isConfirmed: false, isDismissed: true });
              }
            });
          }
          
          const box = document.createElement('div');
          box.className = 'glass-swal-box';
          box.style.position = 'relative';
          
          const closeBtn = document.createElement('button');
          closeBtn.innerHTML = '✕';
          closeBtn.style.cssText = 'position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;z-index:10;';
          closeBtn.onmouseover = () => closeBtn.style.background = 'rgba(255,255,255,0.2)';
          closeBtn.onmouseout = () => closeBtn.style.background = 'rgba(255,255,255,0.1)';
          closeBtn.onclick = () => {
            closeModal();
            resolve({ isConfirmed: false, isDismissed: true });
          };
          box.appendChild(closeBtn);
          
          let html = '';
          if (opts.icon) {
            const icons = {
               warning: '<span class="glass-swal-icon" style="color:#f59e0b;">⚠️</span>',
               error: '<span class="glass-swal-icon" style="color:#ef4444;">❌</span>',
               success: '<span class="glass-swal-icon" style="color:#10b981;">✅</span>',
               info: '<span class="glass-swal-icon" style="color:#3b82f6;">ℹ️</span>'
            };
            if (icons[opts.icon]) html += icons[opts.icon];
          }
          if (opts.imageUrl) {
            html += `<img src="${opts.imageUrl}" style="width:${opts.imageWidth || 200}px; height:${opts.imageHeight || 200}px; border-radius:16px; margin: 0 auto 24px; display:block; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">`;
          }
          if (opts.title) html += `<h3 class="glass-swal-title">${opts.title}</h3>`;
          if (opts.html) html += `<div class="glass-swal-html">${opts.html}</div>`;
          else if (opts.text) html += `<p class="glass-swal-text">${opts.text}</p>`;
          
          const btnWrap = document.createElement('div');
          btnWrap.className = 'glass-swal-btns';
          
          let inputEl = null;
          let validationEl = document.createElement('div');
          validationEl.className = 'glass-swal-validation';
          if (opts.input) {
            if (opts.inputLabel) {
               html += `<div style="text-align:left;font-size:0.85rem;color:rgba(255,255,255,0.7);margin-bottom:8px;font-weight:600;">${opts.inputLabel}</div>`;
            }
            inputEl = document.createElement('input');
            inputEl.type = opts.input === 'number' ? 'number' : 'text';
            inputEl.className = 'glass-swal-input';
            inputEl.placeholder = opts.inputPlaceholder || '';
          }
          
          box.innerHTML = html;
          if (inputEl) {
              box.appendChild(inputEl);
              box.appendChild(validationEl);
          }
          
          if (opts.showCancelButton) {
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'glass-swal-btn cancel';
            cancelBtn.innerHTML = opts.cancelButtonText || 'Cancel';
            if (opts.cancelButtonColor) cancelBtn.style.background = opts.cancelButtonColor;
            cancelBtn.onclick = () => {
              closeModal();
              resolve({ isConfirmed: false, isDismissed: true });
            };
            btnWrap.appendChild(cancelBtn);
          }
          
          if (opts.showConfirmButton !== false) {
            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'glass-swal-btn confirm';
            confirmBtn.innerHTML = opts.confirmButtonText || 'OK';
            if (opts.confirmButtonColor) confirmBtn.style.background = opts.confirmButtonColor;
            confirmBtn.onclick = async () => {
              if (opts.inputValidator && inputEl) {
                 const validationMsg = await opts.inputValidator(inputEl.value);
                 if (validationMsg) {
                    validationEl.textContent = validationMsg;
                    validationEl.style.display = 'block';
                    inputEl.classList.add('error');
                    return;
                 }
              }
              closeModal();
              resolve({ isConfirmed: true, value: inputEl ? inputEl.value : true });
            };
            btnWrap.appendChild(confirmBtn);
          }
          
          if (btnWrap.children.length > 0) box.appendChild(btnWrap);
          overlay.appendChild(box);
          document.body.appendChild(overlay);
          
          if (inputEl) { setTimeout(() => inputEl.focus(), 100); }
          if (opts.timer) {
             timerId = setTimeout(() => {
                 closeModal();
                 resolve({ isConfirmed: false, isDismissed: true });
             }, opts.timer);
          }
          
          requestAnimationFrame(() => {
             overlay.classList.add('show');
             if (opts.didOpen) opts.didOpen();
          });
        });

      }
    };
  </script>
  <style>
    /* Glassmorphism Swal Replacement */
    .glass-swal-overlay {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: rgba(3, 7, 18, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .glass-swal-overlay.show { opacity: 1; }
    .glass-swal-box {
      width: min(420px, calc(100vw - 32px));
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(10, 16, 31, 0.96));
      border: 1px solid rgba(59, 130, 246, 0.22);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 28px 80px rgba(2, 6, 23, 0.44);
      transform: scale(0.95) translateY(20px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: #ffffff;
      text-align: center;
    }
    .glass-swal-overlay.show .glass-swal-box { transform: scale(1) translateY(0); }
    .glass-swal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
    }
    .glass-swal-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .glass-swal-html {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: center;
    }
    .glass-swal-html strong, .glass-swal-html b { color: #ffffff; font-weight: 700; }
    .glass-swal-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      margin-bottom: 24px;
      outline: none;
      transition: 0.2s;
    }
    .glass-swal-input:focus {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
    }
    .glass-swal-input::placeholder { color: rgba(255, 255, 255, 0.4); }
    .glass-swal-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
      margin-top: 24px;
    }
    .glass-swal-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass-swal-btn.confirm {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }
    .glass-swal-btn.confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
    }
    .glass-swal-btn.cancel {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid transparent;
    }
    .glass-swal-btn.cancel:hover { background: rgba(255, 255, 255, 0.12); }
    .glass-swal-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }
    .glass-swal-validation {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: -16px;
      margin-bottom: 20px;
      text-align: left;
      display: none;
    }

    :root {
      --bg: #060e1f;
      --panel: rgba(15, 23, 42, 0.94);
      --panel-2: rgba(17, 24, 39, 0.96);
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: rgba(226,232,240,0.62);
      --gold: #ffb347;
      --orange: #ff9900;
      --green: #7ef0a8;
      --blue: #3b82f6;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(249,115,22,0.10), transparent 26%),
        linear-gradient(180deg, #081122 0%, #060e1f 100%);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(140deg, rgba(15,23,42,0.86), rgba(19,30,58,0.74));
      box-shadow: 0 24px 64px rgba(2, 6, 23, 0.32);
      margin-bottom: 22px;
    }

    .hero-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-family: "Syne", sans-serif;
      font-size: clamp(1.35rem, 2vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .hero-title span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .count-badge {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 179, 71, 0.32);
      background: rgba(255, 179, 71, 0.12);
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      white-space: nowrap;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .cards {
      display: grid;
      gap: 18px;
    }

    .ticket-card {
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(99,102,241,0.16), transparent 24%),
        linear-gradient(145deg, var(--panel), var(--panel-2));
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.34);
      overflow: hidden;
    }

    .ticket-card::before {
      content: "";
      display: block;
      height: 4px;
      background: linear-gradient(90deg, #ff9f1c, #6366f1);
    }

    .ticket-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 22px 24px 14px;
    }

    .slot {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .token {
      margin-top: 6px;
      color: var(--muted);
      font-size: 1rem;
      word-break: break-all;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(34,197,94,0.18);
      background: rgba(34,197,94,0.10);
      color: var(--green);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 0 24px 20px;
    }

    .field {
      min-height: 86px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }

    .label {
      margin-bottom: 8px;
      color: rgba(255,255,255,0.44);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 700;
    }

    .value {
      font-size: 0.98rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .value.hi { color: var(--gold); font-weight: 700; }

    .actions {
      display: flex;
      gap: 12px;
      padding: 0 24px 24px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 170px;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-photo {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      box-shadow: 0 14px 28px rgba(249, 115, 22, 0.18);
    }

    .btn-arrived {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 14px 28px rgba(16, 185, 129, 0.2);
    }

    .btn-arrived[disabled] {
      opacity: 0.7;
      cursor: default;
      box-shadow: none;
    }

    .btn-exit {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 14px 28px rgba(220, 38, 38, 0.18);
    }

    .arrival-panel {
      border: 1px solid rgba(16, 185, 129, 0.16);
      background: linear-gradient(145deg, rgba(16, 185, 129, 0.08), rgba(15, 23, 42, 0.22));
    }

    .arrival-panel .value {
      color: #d1fae5;
    }

    .empty {
      padding: 84px 24px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 28px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .fields { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100%, calc(100% - 20px));
        padding-top: 16px;
      }

      .hero {
        padding: 14px 16px;
        border-radius: 22px;
      }

      .hero-title {
        font-size: 0.9rem;
        gap: 8px;
      }

      .hero-actions {
        gap: 8px;
      }

      .count-badge {
        padding: 6px 9px;
        font-size: 0.58rem;
      }

      .back-btn {
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.84rem;
      }

      .ticket-head,
      .fields,
      .actions {
        padding-left: 16px;
        padding-right: 16px;
      }

      .fields { grid-template-columns: 1fr; }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        min-width: 0;
      }
    }

    /* ── WALLET MODAL ── */
    #walletModal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      padding: 20px; background: rgba(3, 7, 18, 0.72); backdrop-filter: blur(12px); z-index: 13000;
    }
    #walletModal.open { display: flex; }
    body.payment-locked {
      overflow: hidden;
      touch-action: none;
    }
    body.payment-locked > * {
      pointer-events: none;
      user-select: none;
    }
    body.payment-locked .page {
      pointer-events: none;
      user-select: none;
    }
    body.payment-locked #exitPayModal,
    body.payment-locked #walletModal,
    body.payment-locked .glass-swal-overlay {
      pointer-events: auto !important;
    }
    body.payment-locked .back-btn {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .wm-card {
      width: min(420px, calc(100vw - 32px));
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(10, 16, 31, 0.96));
      border: 1px solid rgba(59, 130, 246, 0.22);
      border-radius: 24px;
      box-shadow: 0 28px 80px rgba(2, 6, 23, 0.44);
      animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .wm-head { padding: 20px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; }
    .wm-title { font-family: "Syne", sans-serif; font-size: 1.35rem; font-weight: 800; color: #fff; }
    .wm-body { padding: 24px; }
    .wm-bal-box {
      background: rgba(59, 130, 246, 0.08); border: 1px dashed rgba(59, 130, 246, 0.25);
      border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px;

  <script>
    (function () {
      const APP_VERSION = "20260404.5";
      const ACTIVE_TICKETS_KEY = "pm_active_tickets";

      const PAYMENT_LOCK_KEY = "pm_unpaid_expired_lock_v1";
      const PAYMENT_MODE_LOCK_KEY = "pm_payment_mode_lock_v1";
      const PAYMENT_SUCCESS_REDIRECT_KEY = "pm_payment_success_redirect_v1";
      const TICKET_LIFECYCLE_STATE_KEY = "pm_ticket_lifecycle_state_v1";
      const ARRIVAL_CANCEL_NOTICE_KEY = "pm_arrival_cancel_notice_seen_v1";

      let pendingExitData = null;
      let activeExitTicket = null;
      let exitRequestInFlight = false;
      let pendingExitAction = "exit_ticket";
      let mandatoryPaymentActive = false;
      let paymentHistoryLockArmed = false;
      let timer = null;
      let timeLeft = 10;
      let timerElement = null;
      const PAYMENT_POPUP_ID = "exitPayModal";
      try { history.scrollRestoration = "manual"; } catch { }

      function isPendingExpiredTicket(ticket) {
        return !!ticket && (
          ticket.status === "expired" ||
          ticket.payment_required === 1 ||
          ticket.payment_required === true ||
          ticket.pending_payment === true
        );
      }

      function applyMandatoryPaymentUi() {
        const epCancel = document.querySelector("#exitPayModal .ep-actions .ep-btn-cancel");
        if (epCancel) epCancel.style.display = "inline-flex";

        const wmCancel = document.querySelector("#walletModal .wm-actions .ep-btn-cancel");
        if (wmCancel) wmCancel.style.display = "inline-flex";

        const wmClose = document.querySelector("#walletModal .ticket-photo-close");
        if (wmClose) wmClose.style.display = "inline-flex";
      }

      function startPaymentLock() {
        document.body.style.pointerEvents = "none";
        const paymentPopup = document.getElementById(PAYMENT_POPUP_ID);
        const walletPopup = document.getElementById("walletModal");
        if (paymentPopup) paymentPopup.style.pointerEvents = "auto";
        if (walletPopup) walletPopup.style.pointerEvents = "auto";
      }

      function enterFullscreen() {
        try {
          if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
          }
        } catch { }
      }

      function requestPaymentFullscreenNow() {
        if (!mandatoryPaymentActive) return;
        if (document.fullscreenElement) return;
        enterFullscreen();
      }

      function unlockAfterPayment() {
        document.body.style.pointerEvents = "auto";
      }

      function isPaymentInputTarget(target) {
        return !!target && (
          target.closest?.("#exitPayModal, #walletModal") &&
          /input|textarea|select/i.test(target.tagName || "")
        );
      }

      function isAllowedPaymentKey(event) {
        const key = String(event.key || "");
        const lower = key.toLowerCase();
        const target = event.target;
        const insidePayment = !!target?.closest?.("#exitPayModal, #walletModal");
        if (!insidePayment) return false;

        if (lower === "tab" || lower === "enter" || lower === " ") return true;
        if (isPaymentInputTarget(target)) {
          if (
            key.length === 1 ||
            ["backspace", "delete", "arrowleft", "arrowright", "home", "end", "tab", "enter"].includes(lower)
          ) {
            return true;
          }
        }
        return false;
      }

      function preventLockedKeys(e) {
        if (!mandatoryPaymentActive) return;
        if (isAllowedPaymentKey(e)) return;
        const key = String(e.key || "").toLowerCase();
        const blockRefresh = key === "f5" || ((e.ctrlKey || e.metaKey) && key === "r");
        const blockHistory = (e.altKey && (key === "arrowleft" || key === "arrowright"));
        const blockEscape = key === "escape";
        const isTypingTarget = isPaymentInputTarget(e.target);
        const blockBackspace = key === "backspace" && !isTypingTarget;
        const blockEverythingElse = true;
        if (blockRefresh || blockHistory || blockEscape || blockBackspace || blockEverythingElse) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation?.();
        }
      }

      function showPayment() {
        const paymentPopup = document.getElementById(PAYMENT_POPUP_ID);
        if (paymentPopup) paymentPopup.classList.add("open");
        startPaymentMode();
        requestPaymentFullscreenNow();
        setTimeout(requestPaymentFullscreenNow, 60);
        setTimeout(requestPaymentFullscreenNow, 260);
      }

      function startPaymentMode() {
        mandatoryPaymentActive = true;
        localStorage.setItem(PAYMENT_MODE_LOCK_KEY, "true");
        applyMandatoryPaymentUi();
        document.body.classList.add("payment-locked");
        enterFullscreen();
        startPaymentLock();
        try {
          history.pushState(null, null, location.href);
        } catch { }
        window.onpopstate = function () {
          if (!mandatoryPaymentActive) return;
          try { history.pushState(null, null, location.href); } catch { }
          const lock = loadPaymentLock();
          if (lock?.ticket) restoreLockedPaymentIfAny(lock.ticket);
        };
        document.removeEventListener("keydown", preventLockedKeys, true);
        document.addEventListener("keydown", preventLockedKeys, true);
        window.onbeforeunload = function () {
          if (mandatoryPaymentActive) {
            return "Complete payment first!";
          }
          return null;
        };
      }

      function stopPaymentMode() {
        mandatoryPaymentActive = false;
        localStorage.removeItem(PAYMENT_MODE_LOCK_KEY);
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        document.body.classList.remove("payment-locked");
        unlockAfterPayment();
        window.onpopstate = null;
        window.onbeforeunload = null;
        document.removeEventListener("keydown", preventLockedKeys, true);
        try {
          if (document.fullscreenElement && document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
          }
        } catch { }
      }

      function armMandatoryHistoryLock() {
        if (!mandatoryPaymentActive) return;
        try {
          if (!paymentHistoryLockArmed) {
            history.replaceState({ pm_lock_root: 1 }, "");
            paymentHistoryLockArmed = true;
          }
          history.pushState({ pm_lock: 1 }, "");
          history.pushState({ pm_lock: 2 }, "");
        } catch { }
      }

      function setMandatoryPaymentMode(on) {
        if (on) {
          startPaymentMode();
          armMandatoryHistoryLock();
        } else {
          stopPaymentMode();
        }
      }

      window.addEventListener("popstate", () => {
        if (!mandatoryPaymentActive) return;
        try {
          armMandatoryHistoryLock();
          const lock = loadPaymentLock();
          if (lock?.ticket) {
            restoreLockedPaymentIfAny(lock.ticket);
          }
        } catch { }
      });

      window.addEventListener("pageshow", () => {
        if (!mandatoryPaymentActive) return;
        const lock = loadPaymentLock();
        if (lock?.ticket) restoreLockedPaymentIfAny(lock.ticket);
      });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "visible" || !mandatoryPaymentActive) return;
        const lock = loadPaymentLock();
        if (lock?.ticket) restoreLockedPaymentIfAny(lock.ticket);
      });

      document.addEventListener("contextmenu", (event) => {
        if (!mandatoryPaymentActive) return;
        event.preventDefault();
        event.stopPropagation();
      }, true);

      ["click", "mousedown", "mouseup", "touchstart", "touchend", "pointerdown"].forEach((eventName) => {
        document.addEventListener(eventName, (event) => {
          if (!mandatoryPaymentActive) return;
          const target = event.target;
          const insidePayment = target?.closest?.("#exitPayModal, #walletModal, .glass-swal-overlay, .glass-swal-box");
          if (insidePayment) return;
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
        }, true);
      });

      document.addEventListener("wheel", (event) => {
        if (!mandatoryPaymentActive) return;
        const insidePayment = event.target?.closest?.("#exitPayModal, #walletModal, .glass-swal-overlay, .glass-swal-box");
        if (insidePayment) return;
        event.preventDefault();
        event.stopPropagation();
      }, { capture: true, passive: false });

      document.addEventListener("fullscreenchange", () => {
        if (!mandatoryPaymentActive) return;
        if (document.fullscreenElement) return;
        const lock = loadPaymentLock();
        Swal.fire(
          "Payment Pending",
          `Complete payment first for ${lock?.ticket?.slot ? `Slot #${lock.ticket.slot}` : "this expired ticket"}. Fullscreen payment mode is still active.`,
          "warning"
        ).then(() => {
          if (lock?.ticket) restoreLockedPaymentIfAny(lock.ticket);
          setTimeout(requestPaymentFullscreenNow, 0);
        });
      });

      document.addEventListener("keydown", function (event) {
        if (!mandatoryPaymentActive) return;
        if (isAllowedPaymentKey(event)) return;
        const key = String(event.key || "").toLowerCase();
        const blockRefresh = key === "f5" || ((event.ctrlKey || event.metaKey) && key === "r");
        const blockEscape = key === "escape";
        const isTypingTarget = isPaymentInputTarget(event.target);
        const blockBackspace = key === "backspace" && !isTypingTarget;
        const blockHistoryNav = event.altKey && (key === "arrowleft" || key === "arrowright");
        if (blockRefresh || blockEscape || blockBackspace || blockHistoryNav) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      function getPrimeState() {
        try {
          const user = JSON.parse(localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "null");
          const prime = user?.prime || {};
          return { active: !!prime.active };
        } catch (error) {
          return { active: false };
        }
      }

        if (!ticket || typeof ticket !== "object") return null;
        return ticket;
      }

function loadTickets() {
    try {
        return JSON.parse(localStorage.getItem("pm_active_tickets") || "[]") || [];
    } catch (e) {
        return [];

}
function saveTickets(tickets) {
    localStorage.setItem("pm_active_tickets", JSON.stringify(tickets));
}
function getCurrentUserId() {
    return getUserId();
}
function getUserId() {
    const user = JSON.parse(localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "{}");
    return user.id || localStorage.getItem("pm_user_id") || null;
}

async function fetchTickets() {
    const userId = getUserId();
    if (!userId) {
        console.error("No user ID found");
        return;
    }

    try {
        const res = await fetch(`api.php?action=get_tickets&user_id=${userId}`);
        const data = await res.json();
        
        if (data.status !== "success") {
            console.error("Failed to load tickets:", data.error);
            return;
        }

        saveTickets(data.tickets || []);
        renderTickets(data.tickets || []);
        maybeShowArrivalNoResponseNotice(data.recentArrivalNoResponseCancellation || null);
    } catch (err) {
        console.error("Fetch tickets error:", err);
    }
}





      function removeActiveTicketFallbackIfMatches(tokenOrPnr) {
        try {
          const fb = JSON.parse(localStorage.getItem("activeTicket") || "null");
          if (fb && String(fb.token || fb.pnr) === String(tokenOrPnr)) {
            localStorage.removeItem("activeTicket");
          }
        } catch { }
      }

      function detectZone(slot) {
        const n = Number(slot || 0);
        if (n > 600) return { label: "ZONE D · LEVEL 2" };
        if (n > 400 && n <= 600) return { label: "ZONE C · LEVEL 3" };
        if (n > 150 && n <= 400) return { label: "ZONE B · LEVEL 1" };
        return { label: "ZONE A · ROOFTOP" };
      }

      function getTableRate(ticket, isPrime) {
        const vtype = String(ticket?.vtype || ticket?.vehicle_type || ticket?.type || '').toLowerCase();
        if (vtype === 'bike' || vtype === 'motorcycle') return isPrime ? 12 : 15;
        if (vtype === 'ev') return isPrime ? 24 : 30;
        if (vtype === 'suv' || vtype === 'truck') return isPrime ? 28 : 36;
        if (vtype === 'car') return isPrime ? 20 : 25;

        const zone = String(ticket?.zone || ticket?.zoneLabel || detectZone(ticket?.slot).label || "").toUpperCase();
        let baseRate = 25;
        let primeRate = 20;
        if (zone === 'D' || zone.includes("ZONE D") || zone.includes("LEVEL 2")) { baseRate = 36; primeRate = 28; }
        else if (zone === 'C' || zone.includes("ZONE C") || zone.includes("LEVEL 3")) { baseRate = 30; primeRate = 24; }
        else if (zone === 'B' || zone.includes("ZONE B") || zone.includes("LEVEL 1")) { baseRate = 25; primeRate = 20; }
        else { baseRate = 15; primeRate = 12; }
        
        let rate = isPrime ? primeRate : baseRate;
        return Math.round(rate);
      }

      function getTicketArrivalDeadlineMs(ticket) {
        if (!ticket) return Date.now();
        let dateStr = ticket.entry_at || ticket.created_at;
        if (dateStr) {
            if (typeof dateStr === 'string') dateStr = dateStr.replace('Z', '').replace(' ', 'T');
            const parsed = new Date(dateStr).getTime();
            if (!isNaN(parsed)) return parsed;
        }
        if (ticket.timestamp) return Number(ticket.timestamp);
        return Date.now();
      }

      function getTicketParkingStartMs(ticket) {
        if (!ticket) return NaN;
        const confirmed = ticket.arrival_confirmed_at || "";
        if (confirmed) {
          const parsedConfirmed = new Date(confirmed).getTime();
          if (!isNaN(parsedConfirmed)) return parsedConfirmed;
        }
        return NaN;
      }

      function getStoredBookingMs(ticket, throwOnMissing = false) {
        const source = ticket?.booking_time || "";
        if (source) {
          const parsed = new Date(source).getTime();
          if (!isNaN(parsed)) return parsed;
        }
        if (throwOnMissing) {
          throw new Error("Stored booking time is missing or invalid for this ticket.");
        }
        return NaN;
      }

      function getTicketBookingMs(ticket) {
        return getStoredBookingMs(ticket, false);
      }

      function getTicketBookingIstDate(ticket) {
        const bookingMs = getTicketBookingMs(ticket);
        if (!isFinite(bookingMs)) return null;
        return new Date(bookingMs);
      }

      function getBookedDurationHours(ticket) {
        return Math.max(1, Number(ticket?.duration || ticket?.duration_hours || 1));
      }

      function formatBookedDuration(ticket) {
        const explicitLabel = String(ticket?.duration_label || "").trim();
        if (explicitLabel) return explicitLabel;
        
        const h = Number(ticket?.duration_hours || 0);
        const m = Number(ticket?.duration_minutes || 0);
        if (h > 0 || m > 0) {
            let parts = [];
            if (h > 0) parts.push(`${h} Hr${h > 1 ? "s" : ""}`);
            if (m > 0) parts.push(`${m} Min${m > 1 ? "s" : ""}`);
            return parts.join(" ");
        }
        const hours = getBookedDurationHours(ticket);
        return `${hours} ${hours === 1 ? "Hr" : "Hrs"}`;
      }

      function formatWordsFromSeconds(totalSeconds) {
        const safe = Math.max(0, Math.floor(Number(totalSeconds) || 0));
        const days = Math.floor(safe / 86400);
        const hours = Math.floor((safe % 86400) / 3600);
        const mins = Math.floor((safe % 3600) / 60);
        const secs = safe % 60;

        const parts = [];
        if (days > 0) parts.push(`${days} ${days === 1 ? "day" : "days"}`);
        if (hours > 0) parts.push(`${hours} ${hours === 1 ? "hr" : "hrs"}`);
        if (mins > 0) parts.push(`${mins} min`);
        if (secs > 0 || parts.length === 0) parts.push(`${secs} sec`);
        return parts.join(" ");
      }

      function getLiveParkingDurationLabel(entryMs, nowMs) {
        const now = Number(nowMs) || Date.now();
        const entry = Number(entryMs);
        if (!isFinite(entry)) return "--";

        if (now < entry) {
          const secsUntil = Math.max(0, Math.ceil((entry - now) / 1000));
          if (secsUntil <= 0) return "Starting...";
          return `Starts in ${formatWordsFromSeconds(secsUntil)}`;
        }

        const elapsedSecs = Math.floor((now - entry) / 1000);
        return formatWordsFromSeconds(elapsedSecs);
      }

      function formatDateTimeDisplay(ms, fallbackText) {
        const timeMs = Number(ms);
        if (!isFinite(timeMs)) return fallbackText || "--";
        const value = new Date(timeMs);
        const date = value.toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });
        const time = value.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true });
        return `${date} · ${time}`;
      }

      function getArrivedUnlockMs(ticket) {
        const scheduledMs = getTicketArrivalDeadlineMs(ticket);
        if (!isFinite(scheduledMs)) return NaN;
        return scheduledMs - (10 * 60 * 1000);
      }

      function canMarkArrivedNow(ticket, nowMs = Date.now()) {
        if (!ticket || isPendingExpiredTicket(ticket) || isArrivalConfirmed(ticket)) return false;
        const now = Number(nowMs) || Date.now();
        const unlockMs = getArrivedUnlockMs(ticket);
        return isFinite(unlockMs) && now >= unlockMs;
      }

      function getTicketKey(ticket) {
        // Stable identifier across refresh + server sync:
        // Prefer token/pnr because it stays stable across local + server sync.
        if (!ticket || typeof ticket !== "object") return "";
        const tok = ticket.token || ticket.pnr;
        if (tok) return "tok_" + String(tok);
        if (ticket.id) return "id_" + String(ticket.id);

        const slot = ticket.slot ? String(ticket.slot) : "";
        const hasReliableEntry = !!(ticket.entry_at || ticket.created_at || ticket.timestamp);
        if (hasReliableEntry) {
          const entryMs = getTicketArrivalDeadlineMs(ticket);
          const entryMin = isFinite(entryMs) ? String(Math.floor(entryMs / 60000)) : "";
          if (slot && entryMin) return "slot_" + slot + "_" + entryMin;
        }

        if (slot) return "slot_" + slot;
        return "";
      }

      function getTicketEndMs(ticket) {
        const expectedExitMs = ticket?.expected_exit_at ? new Date(ticket.expected_exit_at).getTime() : NaN;
        if (isFinite(expectedExitMs)) return expectedExitMs;
        const entryMs = getTicketParkingStartMs(ticket);
        if (!isFinite(entryMs)) return Number.POSITIVE_INFINITY;
        const durationMins = (Number(ticket?.duration_hours || getBookedDurationHours(ticket)) * 60) + Number(ticket?.duration_minutes || 0);
        return entryMs + (durationMins * 60000);
      }

      function getTicketWarnSig(ticket) {
        const entryMs = getTicketParkingStartMs(ticket);
        const endMs = getTicketEndMs(ticket);
        return String(Math.floor(entryMs / 60000)) + ":" + String(Math.floor(endMs / 60000));
      }

      function getArrivalStatus(ticket) {
        return String(ticket?.arrival_status || "pending").toLowerCase();
      }

      function isArrivalConfirmed(ticket) {
        return getArrivalStatus(ticket) === "arrived" || !!ticket?.arrival_confirmed_at;
      }

      function getArrivalGraceExpiryMs(ticket) {
        const raw = ticket?.arrival_grace_expires_at || "";
        const parsed = raw ? new Date(raw).getTime() : NaN;
        return isNaN(parsed) ? NaN : parsed;
      }

      function getArrivalPromptState(ticket, nowMs = Date.now()) {
        const now = Number(nowMs) || Date.now();
        if (!ticket || isPendingExpiredTicket(ticket)) {
          return { kind: "none", label: "Arrival not required." };
        }

        const arrivalMs = getTicketArrivalDeadlineMs(ticket);
        const status = getArrivalStatus(ticket);
        const promptMs = ticket?.arrival_prompted_at ? new Date(ticket.arrival_prompted_at).getTime() : NaN;
        const responseDeadlineMs = isFinite(promptMs) ? (promptMs + (60 * 1000)) : NaN;

        if (isArrivalConfirmed(ticket)) {
          return { kind: "arrived", label: "Arrived confirmed. Cancellation logic stopped." };
        }
        if (status === "grace") {
          const graceMs = getArrivalGraceExpiryMs(ticket);
          const remaining = Math.max(0, Math.ceil((graceMs - now) / 1000));
          if (isFinite(graceMs) && remaining > 0) {
            return { kind: "grace", label: `Grace time active: ${formatWordsFromSeconds(remaining)} left.` };
          }
          return { kind: "expired", label: "Grace time expired. Auto cancellation in progress." };
        }
        if (isFinite(responseDeadlineMs)) {
          const remaining = Math.max(0, Math.ceil((responseDeadlineMs - now) / 1000));
          if (remaining > 0) {
            return { kind: "overdue", label: `Respond within ${formatWordsFromSeconds(remaining)} or the booking will be cancelled automatically.` };
          }
          return { kind: "expired", label: "No response received. Auto cancellation in progress." };
        }
        if (now < arrivalMs) {
          return { kind: "pending", label: `Tap Arrived within ${formatWordsFromSeconds(Math.ceil((arrivalMs - now) / 1000))}.` };
        }
        return { kind: "overdue", label: "Arrival time reached. Respond within 1 minute or the booking will be cancelled automatically." };
      }

      function getArrivalPanelHtml(ticket) {
        const state = getArrivalPromptState(ticket, Date.now());
        const labelMap = {
          arrived: "Arrived",
          grace: "Grace Time",
          overdue: "Arrival Check",
          expired: "Cancelling",
          pending: "Awaiting Arrival",
          none: "Arrival Status"
        };
        return `<div class="field arrival-panel"><div class="label">${labelMap[state.kind] || "Arrival Status"}</div><div class="value js-arrival-status" data-ticket-key="${getTicketKey(ticket)}">${state.label}</div></div>`;
      }

      function mergeTicketUpdate(ticketKey, patch) {
        const tickets = loadTickets();
        const idx = tickets.findIndex((t) => getTicketKey(t) === String(ticketKey));
        if (idx === -1) return null;
        tickets[idx] = { ...tickets[idx], ...(patch || {}) };
        saveTickets(tickets);

        const fb = JSON.parse(localStorage.getItem("activeTicket") || "null");
        if (fb && getTicketKey(fb) === getTicketKey(tickets[idx])) {
          localStorage.setItem("activeTicket", JSON.stringify(tickets[idx]));
          localStorage.setItem("parkmate_booking_sync", JSON.stringify(tickets[idx]));
        }
        return tickets[idx];
      }

      async function postTicketAction(action, payload) {
        const res = await fetch(`api.php?action=${encodeURIComponent(action)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {})
        });
        const data = await res.json();
        if (data.status !== "success") {
          throw new Error(data.error || "Request failed");
        }
        return data;
      }

      function loadLifecycleState() {
        try {
          const raw = localStorage.getItem(TICKET_LIFECYCLE_STATE_KEY) || "{}";
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function saveLifecycleState(state) {
        try {
          localStorage.setItem(TICKET_LIFECYCLE_STATE_KEY, JSON.stringify(state || {}));
        } catch { }
      }

      function getArrivalNoticeKey(payload) {
        if (!payload || typeof payload !== "object") return "";
        return String(payload.id || "") + "|" + String(payload.completed_at || "");
      }

      function maybeShowArrivalNoResponseNotice(payload) {
        const noticeKey = getArrivalNoticeKey(payload);
        if (!noticeKey) return;
        const seenKey = localStorage.getItem(ARRIVAL_CANCEL_NOTICE_KEY) || "";
        if (seenKey === noticeKey) return;
        localStorage.setItem(ARRIVAL_CANCEL_NOTICE_KEY, noticeKey);
        const slotText = payload?.slot ? ` for Slot #${payload.slot}` : "";
        Swal.fire(
          "Booking Cancelled",
          `Your booking was cancelled due to no response within the allowed time.${slotText}`,
          "warning"
        );
      }

      function loadPaymentLock() {
        try {
          const raw = localStorage.getItem(PAYMENT_LOCK_KEY) || "null";
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch {
          return null;
        }
      }

      function savePaymentLock(lock) {
        try {
          if (!lock) {
            localStorage.removeItem(PAYMENT_LOCK_KEY);
            return;
          }
          localStorage.setItem(PAYMENT_LOCK_KEY, JSON.stringify(lock));
        } catch { }
      }

      function clearPaymentLock() {
        savePaymentLock(null);
      }

      function upsertPendingExpiredTicket(ticket, lockedPayment) {
        if (!ticket) return null;
        const locked = lockedPayment || {};
        const nextTicket = {
          ...ticket,
          status: "expired",
          payment_required: true,
          pending_payment: true,
          locked_amount: Number(locked.bill ?? ticket.locked_amount ?? ticket.expired_locked_amount ?? 0),
          locked_cashback: Number(locked.cashback ?? ticket.locked_cashback ?? ticket.expired_locked_cashback ?? 0),
        };

        const tickets = loadTickets();
        const key = getTicketKey(ticket);
        const idx = tickets.findIndex((t) => getTicketKey(t) === key);
        if (idx >= 0) tickets[idx] = { ...tickets[idx], ...nextTicket };
        else tickets.unshift(nextTicket);
        saveTickets(tickets);
        return nextTicket;
      }

      async function postJson(url, payload) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {}),
        });

        const text = await res.text();
        let data = {};
        try { data = JSON.parse(text); } catch { }
        if (data && (data.status === "success" || data.already_closed || data.already_processed)) return data;
        if (!res.ok) throw new Error(data.error || "Request failed");
        if (data && data.error) throw new Error(data.error);
        return data;
      }

      async function tryExtendTicketOnServer(ticket, newDurationHours) {
        const userId = getCurrentUserId();
        const ticketId = Number(ticket?.id || 0);
        const ticketToken = String(ticket?.token || ticket?.pnr || "");

        if (!userId) return { skipped: true };
        if (!ticketId && !ticketToken) return { skipped: true };

        return await postJson("api.php?action=extend_ticket", {
          user_id: userId,
          ticket_id: ticketId || undefined,
          ticket_token: ticketToken || undefined,
          duration_hours: Math.max(1, parseInt(newDurationHours, 10)),
        });
      }

      async function tryExpireTicketOnServer(ticket) {
        const userId = getCurrentUserId();
        const ticketId = Number(ticket?.id || 0);
        const ticketToken = String(ticket?.token || ticket?.pnr || "");

        if (!userId) return { skipped: true };
        if (!ticketId && !ticketToken) return { skipped: true };

        return await postJson("api.php?action=expire_ticket", {
          user_id: userId,
          ticket_id: ticketId || undefined,
          ticket_token: ticketToken || undefined,
        });
      }

      function applyDurationUpdate(ticket, newDurationHours, expectedExitAt) {
        const dur = Math.max(1, Number(newDurationHours) || 1);
        ticket.duration = dur;
        ticket.duration_hours = dur;
        
        const m = Number(ticket.duration_minutes || 0);
        let parts = [];
        if (dur > 0) parts.push(`${dur} Hr${dur > 1 ? "s" : ""}`);
        if (m > 0) parts.push(`${m} Min${m > 1 ? "s" : ""}`);
        ticket.duration_label = parts.length > 0 ? parts.join(" ") : `${dur} Hr${dur > 1 ? "s" : ""}`;
        
        if (expectedExitAt) ticket.expected_exit_at = expectedExitAt;
        return ticket;
      }

      async function extendTicketDuration(ticketKey, newDurationHours) {
        const tickets = loadTickets();
        const idx = tickets.findIndex(t => getTicketKey(t) === String(ticketKey));
        if (idx < 0) throw new Error("Ticket not found");

        const ticket = tickets[idx];
        const entryMs = getTicketParkingStartMs(ticket);
        const currentEndMs = getTicketEndMs(ticket);
        const now = Date.now();
        if (now >= currentEndMs) throw new Error("Ticket already expired");
        if (!isFinite(entryMs) || now < entryMs) throw new Error("Parking starts after you tap Arrived.");

        const currentMins = Number(ticket.duration_minutes || 0);
        const currentTotalMins = (getBookedDurationHours(ticket) * 60) + currentMins;
        const nextDur = Math.max(1, Number(newDurationHours) || 0);
        if (!isFinite(nextDur) || (nextDur * 60 + currentMins) <= currentTotalMins) throw new Error("Enter a duration greater than the current duration");

        const needsServer = !!getCurrentUserId() && (!!ticket.id || !!ticket.token || !!ticket.pnr);
        if (needsServer) {
          const data = await tryExtendTicketOnServer(ticket, nextDur);
          tickets[idx] = applyDurationUpdate(ticket, nextDur, data?.expected_exit_at || null);
        } else {
          tickets[idx] = applyDurationUpdate(ticket, nextDur, null);
        }

        saveTickets(tickets);
        const fb = JSON.parse(localStorage.getItem("activeTicket") || "null");
        if (fb && getTicketKey(fb) === getTicketKey(ticket)) {
            localStorage.setItem("activeTicket", JSON.stringify(tickets[idx]));
            localStorage.setItem("parkmate_booking_sync", JSON.stringify(tickets[idx]));
        }
        renderTickets(tickets);
      }

      async function expireTickets(expired) {
        if (!Array.isArray(expired) || expired.length === 0) return;

        const toExpireKeys = new Set(expired.map(x => String(x.key)));
        const toExpireSlots = new Set(expired.map(x => Number(x.ticket?.slot)).filter(n => isFinite(n)));
        const serverLocks = {};

        for (const item of expired) {
          try {
            const data = await tryExpireTicketOnServer(item.ticket);
            serverLocks[item.key] = data || {};
          } catch { }
        }

        let tickets = loadTickets();
        tickets = tickets.map((t) => {
          const key = getTicketKey(t);
          if (!toExpireKeys.has(key)) return t;
          const lockData = serverLocks[key] || {};
          return {
            ...t,
            status: "expired",
            payment_required: true,
            pending_payment: true,
            locked_amount: Number(lockData.locked_amount || 0),
            locked_cashback: Number(lockData.locked_cashback || 0),
          };
        });
        saveTickets(tickets);

        let bookedSlots = [];
        try { bookedSlots = JSON.parse(localStorage.getItem("bookedSlots") || "[]") || []; } catch { }
        bookedSlots = (Array.isArray(bookedSlots) ? bookedSlots : []).map(Number).filter(slot => !toExpireSlots.has(Number(slot)));
        localStorage.setItem("bookedSlots", JSON.stringify(bookedSlots));

        renderTickets(tickets);
        return serverLocks;
      }

      let lifecycleCheckInFlight = false;
      let lifecycleModalOpen = false;
      let lifecycleLastCheckMs = 0;

      async function handleArrivalPrompt(ticket) {
        const userId = getCurrentUserId();
        if (!ticket?.id || !userId) return;
        const key = getTicketKey(ticket);

        lifecycleModalOpen = true;
        try {
          const existingPromptMs = ticket?.arrival_prompted_at ? new Date(ticket.arrival_prompted_at).getTime() : NaN;
          const shouldStartServerWindow = !isFinite(existingPromptMs);
          const startData = shouldStartServerWindow
            ? await postTicketAction("start_arrival_response_window", {
                user_id: userId,
                ticket_id: ticket.id
              })
            : {
                status: "success",
                arrival_prompted_at: ticket.arrival_prompted_at,
                arrival_response_deadline_at: new Date(existingPromptMs + (60 * 1000)).toISOString()
              };
          if (startData.already_arrived) {
            await fetchTickets();
            return;
          }
          const promptedAtIso = startData.arrival_prompted_at || new Date().toISOString();
          const responseDeadlineIso = startData.arrival_response_deadline_at || new Date(Date.now() + (60 * 1000)).toISOString();
          mergeTicketUpdate(key, {
            arrival_status: "pending",
            arrival_prompted_at: promptedAtIso,
            arrival_grace_expires_at: null
          });
          renderTickets(loadTickets());

          let countdownInterval;
          const res = await Swal.fire({
            title: "Are you arriving at the parking location?",
            html: `Respond within <b id="arrivalResponseCountdown" style="color:#ef4444;">1 min 0 sec</b> or the booking will be cancelled automatically.`,
            icon: "warning",
            showCancelButton: true,
            confirmButtonText: "Yes",
            cancelButtonText: "No",
            confirmButtonColor: "#10b981",
            cancelButtonColor: "#ef4444",
            allowOutsideClick: false,
            allowEscapeKey: false,
            timer: Math.max(1, new Date(responseDeadlineIso).getTime() - Date.now()),
            didOpen: () => {
              const updateCountdown = () => {
                const countdownEl = document.getElementById("arrivalResponseCountdown");
                if (!countdownEl) return;
                const remainingMs = Math.max(0, new Date(responseDeadlineIso).getTime() - Date.now());
                const totalSec = Math.ceil(remainingMs / 1000);
                const mins = Math.floor(totalSec / 60);
                const secs = totalSec % 60;
                countdownEl.textContent = `${mins} min ${secs} sec`;
              };
              updateCountdown();
              countdownInterval = setInterval(updateCountdown, 1000);
            },
            willClose: () => {
              if (countdownInterval) clearInterval(countdownInterval);
            }
          });

          if (res.isConfirmed) {
            const data = await postTicketAction("grant_arrival_grace", {
              user_id: userId,
              ticket_id: ticket.id
            });
            mergeTicketUpdate(key, {
              arrival_status: "grace",
              arrival_grace_expires_at: data.arrival_grace_expires_at || new Date(Date.now() + (15 * 60 * 1000)).toISOString(),
              arrival_prompted_at: promptedAtIso
            });
            renderTickets(loadTickets());
            await Swal.fire("Grace Time", data.message || "You have been given 15 minutes grace time.", "success");
            fetchTickets();
            return;
          }

          if (res.isDismissed && !res.isConfirmed) {
            const currentTicket = loadTickets().find((item) => getTicketKey(item) === key) || ticket;
            const currentPromptMs = currentTicket?.arrival_prompted_at ? new Date(currentTicket.arrival_prompted_at).getTime() : NaN;
            if (isFinite(currentPromptMs) && (Date.now() - currentPromptMs) >= 60000) {
              try { await fetchTickets(); } catch { }
              return;
            }
          }

          await cancelForArrival(
            ticket,
            "arrival_declined",
            "Booking cancelled. Cancellation charges have been applied."
          );
        } finally {
          lifecycleModalOpen = false;
        }
      }

      async function runTicketLifecycleChecks(nowMs) {
        const now = Number(nowMs) || Date.now();
        if (lifecycleCheckInFlight || lifecycleModalOpen) return;
        if (now - lifecycleLastCheckMs < 5000) return;
        lifecycleLastCheckMs = now;

        const tickets = loadTickets();
        if (!tickets.length) return;

        lifecycleCheckInFlight = true;
        try {
          const state = loadLifecycleState();

          const expired = [];
          let expiringSoon = null;
          let arrivalPromptTicket = null;
          let unansweredArrivalTicket = null;

          for (const ticket of tickets) {
            const key = getTicketKey(ticket);
            if (!key) continue;
            if (isPendingExpiredTicket(ticket)) continue;

            const arrivalStatus = getArrivalStatus(ticket);
            const arrivalMs = getTicketArrivalDeadlineMs(ticket);
            const promptedAtMs = ticket?.arrival_prompted_at ? new Date(ticket.arrival_prompted_at).getTime() : NaN;
            if (!isArrivalConfirmed(ticket)) {
              if (arrivalStatus === "pending" && isFinite(promptedAtMs) && now >= (promptedAtMs + (60 * 1000))) {
                if (!unansweredArrivalTicket) unansweredArrivalTicket = { ticket, key };
                continue;
              }
              const shouldShowPrompt = arrivalStatus === "pending" && now >= arrivalMs && (
                !ticket?.arrival_prompted_at ||
                (isFinite(promptedAtMs) && now < (promptedAtMs + (60 * 1000)))
              );
              if (shouldShowPrompt) {
                if (!arrivalPromptTicket || arrivalMs < getTicketArrivalDeadlineMs(arrivalPromptTicket.ticket)) {
                  arrivalPromptTicket = { ticket, key };
                }
                continue;
              }
            }

            // Ticket warning/expiry lifecycle should begin only after the user
            // has explicitly marked the booking as arrived.
            if (!isArrivalConfirmed(ticket)) continue;

            const entryMs = getTicketParkingStartMs(ticket);
            if (!isFinite(entryMs) || now < entryMs) continue;

            const endMs = getTicketEndMs(ticket);
            const bookedDurationMinutes = Math.max(
              1,
              (Math.max(0, Number(ticket?.duration_hours || ticket?.duration || 0)) * 60) +
              Math.max(0, Number(ticket?.duration_minutes || 0))
            );
            const timeInLiveDuration = now - entryMs;

            // Don't show warnings until at least 1 minute of live duration has completed
            if (timeInLiveDuration < 60 * 1000) {
              continue;
            }

            const warnSig = getTicketWarnSig(ticket);

            if (now >= endMs) {
              if ((state[key]?.expiredSig || "") === warnSig) continue;
              expired.push({ ticket, key, endMs });
              continue;
            }

            let effectiveWarningMs = 15 * 60 * 1000; // Default 15 minutes
            if (bookedDurationMinutes === 2) {
              effectiveWarningMs = 1 * 60 * 1000; // For 2-minute bookings, warn when 1 minute remains
            } else if (bookedDurationMinutes <= 5) {
              effectiveWarningMs = 1 * 60 * 1000; // Keep short bookings on a 1-minute warning
            }

            if (now >= (endMs - effectiveWarningMs)) {
              if ((state[key]?.warnedSig || "") === warnSig) continue;
              if (!expiringSoon || endMs < expiringSoon.endMs) {
                expiringSoon = { ticket, key, endMs, warnSig };
              }
            }
            }

          if (unansweredArrivalTicket) {
            lifecycleModalOpen = true;
            try {
              await cancelForArrival(
                unansweredArrivalTicket.ticket,
                "arrival_no_response",
                "Booking cancelled due to no response. Cancellation charges have been applied."
              );
            } finally {
              lifecycleModalOpen = false;
            }
            return;
          }

          if (arrivalPromptTicket) {
            await handleArrivalPrompt(arrivalPromptTicket.ticket);
            return;
          }

          if (expired.length) {
            for (const it of expired) {
              const sig = getTicketWarnSig(it.ticket);
              state[it.key] = { ...(state[it.key] || {}), expiredSig: sig };
            }
            saveLifecycleState(state);

            lifecycleModalOpen = true;
            const serverLocks = await expireTickets(expired);

            // Expiry should not auto-open payment. Mark the ticket as pending and wait for user action.
            const firstExpired = expired[0];
            const lockData = serverLocks?.[firstExpired.key] || {};
            const locked = {
              bill: Number(lockData.locked_amount || 0),
              cashback: Number(lockData.locked_cashback || 0),
            };
            locked.payable = Math.max(0, locked.bill - locked.cashback);
            const pendingTicket = upsertPendingExpiredTicket(firstExpired.ticket, locked) || firstExpired.ticket;
            renderTickets(loadTickets());
            const expiredPrompt = await Swal.fire({
              title: "Time Expired",
              text: `Parking time expired for ${pendingTicket?.slot ? `Slot #${pendingTicket.slot}` : "this ticket"}. Click OK to continue to payment now.`,
              icon: "warning",
              confirmButtonText: "OK",
              allowOutsideClick: false,
              allowEscapeKey: false
            });
            if (expiredPrompt.isConfirmed) {
              openExitPayForTicket(pendingTicket, "pay_ticket", locked);
            }

            lifecycleModalOpen = false;
            return;
          }

          if (expiringSoon) {
            const remainingSec = Math.max(0, Math.ceil((expiringSoon.endMs - now) / 1000));
            state[expiringSoon.key] = { ...(state[expiringSoon.key] || {}), warnedSig: expiringSoon.warnSig };
            saveLifecycleState(state);

            lifecycleModalOpen = true;
            const slotLabel = expiringSoon.ticket?.slot ? ("Slot #" + expiringSoon.ticket.slot) : "Your slot";
            let expireInterval;
            const res = await Swal.fire({
              title: "Ticket Expiring Soon",
              html: `${slotLabel} is expiring soon.<br>Ticket ends in: <b id="swalCountdown" style="color: #ef4444;">--:--</b><br><br>Do you want to extend?`,
              icon: "warning",
              showCancelButton: true,
              confirmButtonText: "Extend",
              cancelButtonText: "Ignore",
              confirmButtonColor: "#f59e0b",
              cancelButtonColor: "#6b7280",
              didOpen: () => {
                const updateTimer = () => {
                  const timeLeft = expiringSoon.endMs - Date.now();
                  const el = document.getElementById('swalCountdown');
                  if (!el) return;
                  if (timeLeft <= 0) {
                    el.textContent = "0 min 0 sec";
                    clearInterval(expireInterval);
                  } else {
                    const m = Math.floor(timeLeft / 60000);
                    const s = Math.floor((timeLeft % 60000) / 1000);
                    el.textContent = `${m} min ${s} sec`;
                  }
                };
                updateTimer();
                expireInterval = setInterval(updateTimer, 1000);
              },
              willClose: () => {
                if (expireInterval) clearInterval(expireInterval);
              }
            });

            if (res.isConfirmed) {
              const currentDurHours = getBookedDurationHours(expiringSoon.ticket);
              const currentDurLabel = formatBookedDuration(expiringSoon.ticket);
              const res2 = await Swal.fire({
                title: "Extend Duration",
                text: "Enter new total duration in hours (current: " + currentDurLabel + ")",
                icon: "info",
                input: "number",
                inputLabel: "New Duration (hours)",
                inputPlaceholder: String(currentDurHours + 1),
                showCancelButton: true,
                confirmButtonText: "Update",
                confirmButtonColor: "#3b82f6",
                cancelButtonColor: "#6b7280",
                inputValidator: (value) => {
                  const v = Number(value);
                  if (!value || !isFinite(v)) return "Enter a valid number";
                  const currentMins = Number(expiringSoon.ticket.duration_minutes || 0);
                  const currentTotalMins = (getBookedDurationHours(expiringSoon.ticket) * 60) + currentMins;
                  if ((v * 60) + currentMins <= currentTotalMins) return "New duration must be greater than current duration";
                  return null;
                }
              });

              if (res2.isConfirmed) {
                try {
                  await extendTicketDuration(expiringSoon.key, res2.value);
                  const s2 = loadLifecycleState();
                  if (s2[expiringSoon.key]) delete s2[expiringSoon.key].warnedSig;
                  saveLifecycleState(s2);

                  await Swal.fire("Extended", "Your ticket duration has been updated.", "success");
                } catch (e) {
                  await Swal.fire("Unable to Extend", e?.message || "Please try again.", "error");
                }
              }
            }

            // If user clicks Ignore: do nothing now (parking continues normally).

            lifecycleModalOpen = false;
          }
        } finally {
          lifecycleCheckInFlight = false;
        }
      }

      function formatParkInDateTime(ticket) {
        const entryMs = getTicketParkingStartMs(ticket);
        if (!isFinite(entryMs)) {
          return "Will start when you tap Arrived";
        }
        const entryTimeVal = new Date(entryMs);
        const date = entryTimeVal.toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });
        const time = entryTimeVal.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true });
        return `${date} · ${time}`;
      }

      function formatBookingDateTime(ticket) {
        const bookingDate = getTicketBookingIstDate(ticket);
        if (!(bookingDate instanceof Date) || isNaN(bookingDate.getTime())) {
          return "Booking time unavailable";
        }
        const date = bookingDate.toLocaleDateString("en-GB", { day: "2-digit", month: "long", year: "numeric" });
        const time = bookingDate.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true });
        return `${date} · ${time}`;
      }

      function formatScheduledParkInDateTime(ticket) {
        return formatDateTimeDisplay(
          getTicketArrivalDeadlineMs(ticket),
          "Parking time unavailable"
        );
      }

      function formatArrivedDateTime(ticket) {
        return formatDateTimeDisplay(
          getTicketParkingStartMs(ticket),
          "Will show after you tap Arrived"
        );
      }

      function estimateBill(ticket, hourlyRate) {
        const entryMs = getTicketParkingStartMs(ticket);
        if (!isFinite(entryMs)) return 0;
        const elapsedMs = Math.max(0, Date.now() - entryMs);
        const totalMins = Math.floor(elapsedMs / 60000);
        const elapsedHours = elapsedMs / 3600000;
        if (totalMins < 1) return Math.ceil(hourlyRate / 60);
        if (elapsedHours < 1) return Math.ceil(totalMins * (hourlyRate / 60));
        return Math.round(hourlyRate * elapsedHours);
      }

      function getCancellationFee(bookingMs, cancellationMs) {
        const elapsedHrs = Math.max(0, (Number(cancellationMs) - Number(bookingMs)) / 3600000);
        if (elapsedHrs <= 2) return 10;
        if (elapsedHrs <= 4) return 25;
        return 75;
      }

      function selectTicket(token) {
        localStorage.setItem(ACTIVE_TICKET_SELECTED_KEY, String(token || ""));
      }

      function openExitPayForTicket(ticket, action, lockedPayment) {
        activeExitTicket = ticket;
        pendingExitAction = action === "pay_ticket" ? "pay_ticket" : "exit_ticket";
        if (!activeExitTicket) return;
        setMandatoryPaymentMode(pendingExitAction === "pay_ticket");

        const isPrime = getPrimeState().active;
        const paymentPending = isPendingExpiredTicket(ticket);
        const entryMs = getTicketParkingStartMs(activeExitTicket);
        const billingNowMs = paymentPending ? getTicketEndMs(activeExitTicket) : Date.now();
        if (!isFinite(entryMs)) {
          Swal.fire("Arrival Required", "Tap Arrived to start live parking duration and billing.", "info");
          return;
        }
        let elapsedMs = Math.max(0, billingNowMs - entryMs);
        if (billingNowMs < entryMs) elapsedMs = 0;
        const totalMins = Math.floor(elapsedMs / 60000);
        const elapsedHrs = elapsedMs / 3600000;
        
        const hourlyRate = getTableRate(activeExitTicket, isPrime);
        const perMinRate = hourlyRate / 60;
        
        let bill;
        if (lockedPayment && isFinite(Number(lockedPayment.bill))) {
          bill = Number(lockedPayment.bill);
        } else if (totalMins < 1) bill = Math.ceil(hourlyRate / 60);
        else if (elapsedHrs < 1) bill = Math.ceil(totalMins * perMinRate);
        else bill = Math.round(hourlyRate * elapsedHrs);
        
        const cashback = lockedPayment && isFinite(Number(lockedPayment.cashback))
          ? Number(lockedPayment.cashback)
          : (isPrime ? Math.floor(bill * 0.2) : 0);
        const payable = lockedPayment && isFinite(Number(lockedPayment.payable))
          ? Number(lockedPayment.payable)
          : Math.max(0, bill - cashback);
        const h = Math.floor(totalMins / 60);
        const m = totalMins % 60;
        const durLabel = h > 0 ? h + "h " + m + "m" : m + " mins";

        pendingExitData = { bill, cashback, payable };
        if (pendingExitAction === "pay_ticket") {
          activeExitTicket = upsertPendingExpiredTicket(activeExitTicket, pendingExitData) || activeExitTicket;
          savePaymentLock({
            ticket: activeExitTicket,
            bill,
            cashback,
            payable,
            lockedAt: Date.now()
          });
        }

        document.getElementById("epToken").textContent = activeExitTicket.token || activeExitTicket.pnr || "N/A";
        document.getElementById("epDuration").textContent = durLabel;
        
        const standardRate = getTableRate(activeExitTicket, false);
        let rateHtml = `₹${standardRate}/hr`;
        if (isPrime) {
           rateHtml = `<span style="text-decoration:line-through;color:#888;font-size:0.75rem;">₹${standardRate}/hr</span> <span style="color:var(--gold);">₹${hourlyRate}/hr</span>`;
        }
        document.getElementById("epRate").innerHTML = rateHtml + ` <span style="color:rgba(255,255,255,0.4);font-size:0.75rem;">· ₹${perMinRate.toFixed(2)}/min</span>`;
        
        document.getElementById("epBillAmt").textContent = "₹" + bill;

        const cbRow = document.getElementById("epCashbackRow");
        if (isPrime) {
          cbRow.style.display = "flex";
          document.getElementById("epCashbackVal").textContent = "+₹" + cashback;
        } else {
          cbRow.style.display = "none";
        }

        let currentUser = JSON.parse(localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "null");
        const balance = currentUser ? (parseFloat(currentUser.balance) || 0) : 0;
        
        const walBox = document.getElementById("epWalletBox");
        document.getElementById("epWalletBal").textContent = "₹" + balance.toFixed(2);
        
        const payBtn = document.getElementById("epPayBtn");
        const addBtn = document.getElementById("epAddBtn");

        if (balance >= payable) {
          walBox.className = "ep-wallet suff";
          document.getElementById("epWalletStat").innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;"></i> <span style="color:#10b981;">Sufficient</span>';
          payBtn.style.display = "flex";
          addBtn.style.display = "none";
          payBtn.innerHTML = `<i class="fas fa-check-circle"></i> Pay ₹${payable}`;
        } else {
          walBox.className = "ep-wallet insuff";
          document.getElementById("epWalletStat").innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i> <span style="color:#ef4444;">Low Balance</span>';
          payBtn.style.display = "none";
          addBtn.style.display = "flex";
          const deficit = payable - balance;
          addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> Add ₹${deficit.toFixed(2)}`;
          addBtn.onclick = () => {
            if (!mandatoryPaymentActive) closeExitPayModal();
            openWalletTopUp(deficit);
          };
        }

        const epModal = document.getElementById("exitPayModal");
        if(epModal) epModal.classList.add("open");
      }

      function goToExit(token) {
        selectTicket(token);
        
        const tickets = loadTickets();
        const t = tickets.find(t => String(t.token||t.pnr) === String(token));
        if (!t) return;
        openExitPayForTicket(t, "exit_ticket");
      }

      function restoreLockedPaymentIfAny(serverTicket) {
        const lock = loadPaymentLock();
        const sourceTicket = serverTicket || lock?.ticket || null;
        if (!sourceTicket) return false;

        const bill = Number(serverTicket?.locked_amount ?? lock?.bill ?? 0);
        const cashback = Number(serverTicket?.locked_cashback ?? lock?.cashback ?? 0);
        const payable = Math.max(0, Number(serverTicket?.locked_amount ?? lock?.bill ?? 0) - Number(serverTicket?.locked_cashback ?? lock?.cashback ?? 0));

        const pendingTicket = upsertPendingExpiredTicket(sourceTicket, { bill, cashback, payable }) || sourceTicket;
        const currentTickets = loadTickets();
        if (currentTickets.length === 0 || !currentTickets.some((t) => getTicketKey(t) === getTicketKey(pendingTicket))) {
          saveTickets([pendingTicket, ...currentTickets]);
        }
        renderTickets(loadTickets());
        openExitPayForTicket(pendingTicket, "pay_ticket", { bill, cashback, payable });
        return true;
      }

        let currentUser = JSON.parse(localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "null");
        if (!currentUser) return;

        document.getElementById('walletModal').classList.add('open');
        applyMandatoryPaymentUi();
      }

      async function queueNextExpiredPaymentOrRedirect(currentUser) {
        document.querySelectorAll('.glass-swal-overlay').forEach(el => el.remove());
        const userId = currentUser?.id || localStorage.getItem("pm_user_id");
        if (!userId) {
          window.location.href = "index.html?v=20260404.5";
          return;
        }

        try {
          const res = await fetch(`api.php?action=get_user&id=${encodeURIComponent(userId)}`);
          const data = await res.json();
          if (data?.unpaidExpiredTicket) {
            restoreLockedPaymentIfAny(data.unpaidExpiredTicket);
            await Swal.fire(
              "Next Expired Ticket",
              `Another expired ticket is pending${data?.unpaidExpiredTicket?.slot ? ` on Slot #${data.unpaidExpiredTicket.slot}` : ""}. Click Complete Payment for the next ticket to continue.`,
              "warning"
            );
            return;
          }
        } catch { }

        localStorage.setItem(PAYMENT_SUCCESS_REDIRECT_KEY, JSON.stringify({
          title: "All Expired Tickets Paid",
          message: "All expired tickets were paid successfully. You can now continue with normal booking flow.",
          at: Date.now()
        }));
        window.location.href = "index.html?v=20260404.5";
      }

      function closeWalletModal(forceClose) {
        if (mandatoryPaymentActive && !forceClose) {
          Swal.fire("Payment Pending", `Ticket expired${activeExitTicket?.slot ? ` for Slot #${activeExitTicket.slot}` : ""}. Complete the pending payment to continue.`, "warning");
