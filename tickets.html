      async function processWalletAdd() {
        let currentUser = JSON.parse(localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "null");
        if (!currentUser) return;

        const amtInput = document.getElementById('wmAddAmount').value;
        const amt = parseFloat(amtInput);
        if (isNaN(amt) || amt <= 0) {
          Swal.fire("Invalid Amount", "Enter a valid amount to add.", "error");
          return;
        }
        
        const btn = document.getElementById('wmSubmitBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;
        
        try {
          const res = await fetch("api.php?action=update_wallet", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: currentUser.id,
              amount: amt,
            }),
          });
          const data = await res.json();
          if (data.status === "success") {
            currentUser.balance = parseFloat(currentUser.balance || 0) + amt;
            localStorage.setItem("pmCurrentUser", JSON.stringify(currentUser));
            localStorage.setItem("currentUser", JSON.stringify(currentUser));
            if (window.confetti) {
              confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } });
            }
            closeWalletModal(true);
            Swal.fire("Success", "₹" + amt.toFixed(2) + " added to wallet!", "success").then(() => {
              if (typeof window.onWalletSuccessOnce === 'function') {
                const callback = window.onWalletSuccessOnce;
                window.onWalletSuccessOnce = null;
                callback();
                return;
              }
              if (activeExitTicket) {
                if (pendingExitAction === "pay_ticket") {
                  openExitPayForTicket(activeExitTicket, "pay_ticket", pendingExitData);
                } else {
                  goToExit(activeExitTicket.token || activeExitTicket.pnr);
                }
              }
            });
          } else {
            Swal.fire("Error", data.error || "Failed to add funds", "error");
          }
        } catch (e) {
          Swal.fire("Error", "Network error. Please try again.", "error");
        } finally {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }

      function closeExitPayModal() {
        if (mandatoryPaymentActive) {
          Swal.fire("Payment Pending", `Ticket expired${activeExitTicket?.slot ? ` for Slot #${activeExitTicket.slot}` : ""}. Complete the pending payment to remove this ticket.`, "warning");
          return;
        }
        const epModal = document.getElementById("exitPayModal");
        if(epModal) epModal.classList.remove("open");
      }

      async function confirmExitPay() {
        let currentUser = JSON.parse(localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "null");
        if (!currentUser || !activeExitTicket) return;
        if (exitRequestInFlight) return;

        const epModal = document.getElementById("exitPayModal");
        if (epModal) epModal.classList.remove("open");
        const { bill, cashback, payable } = pendingExitData;
        
        if (currentUser.balance >= payable) {
          try {
            exitRequestInFlight = true;
            const action = pendingExitAction === "pay_ticket" ? "pay_ticket" : "exit_ticket";
            const res = await fetch("api.php?action=" + action, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                user_id: currentUser.id,
                ticket_id: activeExitTicket.id,
                ticket_token: activeExitTicket.token || activeExitTicket.pnr || "",
                amount: bill,
                cashback: cashback,
              }),
            });
            
            const text = await res.text();
            let data = {};
            try { data = JSON.parse(text); } catch(e) { throw new Error("Invalid API response"); }
            
            if (data.status === "success" || data.already_processed) {
              if (pendingExitAction === "pay_ticket") {
                setMandatoryPaymentMode(false);
                clearPaymentLock();
              }
              currentUser.balance = parseFloat(data.new_balance ?? Math.max(0, currentUser.balance - payable));
              localStorage.setItem("currentUser", JSON.stringify(currentUser));
              localStorage.setItem("pmCurrentUser", JSON.stringify(currentUser));
              
              let tickets = loadTickets();
              tickets = tickets.filter(t => String(t.token||t.pnr) !== String(activeExitTicket.token||activeExitTicket.pnr));
              localStorage.setItem(ACTIVE_TICKETS_KEY, JSON.stringify(tickets));
              const userId = currentUser.id || localStorage.getItem("pm_user_id");
              if (userId) {
                  localStorage.setItem(`pm_active_tickets_${userId}`, JSON.stringify(tickets));
                  localStorage.removeItem(`pm_active_ticket_${userId}`);
                  localStorage.removeItem(`pm_active_ticket_selected_${userId}`);
              }
              if (tickets[0]?.token || tickets[0]?.pnr) {
                  localStorage.setItem(ACTIVE_TICKET_SELECTED_KEY, String(tickets[0].token || tickets[0].pnr));
              } else {
                  localStorage.removeItem(ACTIVE_TICKET_SELECTED_KEY);
              }
              
              const fb = JSON.parse(localStorage.getItem("activeTicket") || "null");
              if (fb && String(fb.token||fb.pnr) === String(activeExitTicket.token||activeExitTicket.pnr)) {
                  localStorage.removeItem("activeTicket");
              }
              if (tickets[0]) {
                  localStorage.setItem("activeTicket", JSON.stringify(tickets[0]));
              } else {
                  localStorage.removeItem("activeTicket");
              }
              localStorage.removeItem("parkmate_booking_sync");
              localStorage.removeItem("pm_ticket_banner_snapshot");
              
              let bookedSlots = JSON.parse(localStorage.getItem("bookedSlots") || "[]") || [];
              bookedSlots = bookedSlots.map(Number).filter(slot => slot !== Number(activeExitTicket.slot));
              localStorage.setItem("bookedSlots", JSON.stringify(bookedSlots));
              
              if(window.confetti) {
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
              }
              
              if (pendingExitAction === "pay_ticket") {
                Swal.fire(
                  "Ticket Expired",
                  "Parking duration completed. Ticket has expired. Payment received. Slot is now free.",
                  "success"
                ).then(() => queueNextExpiredPaymentOrRedirect(currentUser));
              } else {
              Swal.fire(
                data.already_processed ? "Payment Already Completed" : "Payment Successful! 🎉",
                data.already_processed ? "Your booking was already closed." : `₹${(parseFloat(data.amount_paid) || payable).toFixed(2)} deducted. New wallet balance: ₹${currentUser.balance.toFixed(2)}.`,
                "success"
              ).then(() => { window.location.reload(); });
              }
            } else {
               throw new Error(data.error || "Payment failed");
            }
          } catch (e) {
            const msg = e?.message || "Unable to complete payment.";
            if (/already closed|no active ticket/i.test(msg)) {
              clearPaymentLock();
              setMandatoryPaymentMode(false);
              let tickets = loadTickets();
              tickets = tickets.filter(t => String(t.token||t.pnr) !== String(activeExitTicket.token||activeExitTicket.pnr));
              localStorage.setItem(ACTIVE_TICKETS_KEY, JSON.stringify(tickets));
              Swal.fire("Already Completed", "This booking was already closed.", "info").then(() => window.location.reload());
            } else {
              Swal.fire("Payment failed", msg, "error");
            }
          } finally {
            exitRequestInFlight = false;
          }
        }
      }

      }

      window.closeTicketPhotoModal = function() {
        const modal = document.getElementById("ticketPhotoModal");
        const frame = document.getElementById("ticketPhotoFrame");
        if (modal) modal.style.display = "none";
        if (frame) frame.src = "about:blank";
      };

      function payPendingTicket(token) {
        const tickets = loadTickets();
        const ticket = tickets.find(t => String(t.token || t.pnr) === String(token));
        if (!ticket) return;
        enterFullscreen();
        const bill = Number(ticket.locked_amount || 0);
        const cashback = Number(ticket.locked_cashback || 0);
        openExitPayForTicket(ticket, "pay_ticket", {
          bill,
          cashback,
          payable: Math.max(0, bill - cashback)
        });
      }

      function buildCard(ticket) {
        const token = ticket.token || ticket.pnr || "";
        const isPrime = getPrimeState().active;
        const paymentPending = isPendingExpiredTicket(ticket);
        const zoneLabel = detectZone(ticket.slot).label;
        const rate = getTableRate(ticket, isPrime);
        const standardRate = getTableRate(ticket, false);
        
        const entryMs = getTicketParkingStartMs(ticket);
        const started = isFinite(entryMs) && Date.now() >= entryMs;
        const arrivalConfirmed = isArrivalConfirmed(ticket);
        const parkInLabel = formatScheduledParkInDateTime(ticket);
        const arrivedAtLabel = formatArrivedDateTime(ticket);
        const bookingLabel = formatBookingDateTime(ticket);
        const duration = formatBookedDuration(ticket);
        const arrivedEnabled = canMarkArrivedNow(ticket);
        const arrivedUnlockMs = getArrivedUnlockMs(ticket);
        const arrivedHint = !arrivalConfirmed && !arrivedEnabled && isFinite(arrivedUnlockMs)
          ? `Available from ${formatDateTimeDisplay(arrivedUnlockMs, "--")}`
          : "";
        const liveDuration = paymentPending
          ? `${duration} (Expired)`
          : (started ? getLiveParkingDurationLabel(entryMs, Date.now()) : "Starts when you tap Arrived");
        const bill = paymentPending ? Number(ticket.locked_amount || 0) : (started ? estimateBill(ticket, rate) : 0);
        const rawType = ticket.vtype || ticket.vehicle_type || ticket.vehicleType || ticket.type || ticket.vehType || "Car";
        const type = rawType.toUpperCase();
        const exitPayDisplay = paymentPending ? "" : (started ? "" : "display:none;");
        const exitPayDisabled = paymentPending ? "" : (started ? "" : "disabled");
        const statusLabel = paymentPending ? "PAYMENT PENDING" : (arrivalConfirmed ? "ARRIVED" : "ACTIVE");
        const statusStyle = paymentPending
          ? 'border-color: rgba(239,68,68,0.18); background: rgba(239,68,68,0.10); color: #fca5a5;'
          : (arrivalConfirmed ? 'border-color: rgba(16,185,129,0.22); background: rgba(16,185,129,0.12); color: #86efac;' : "");
        const paymentInfo = paymentPending
          ? `<div class="field"><div class="label">Ticket Status</div><div class="value hi" style="color:#fca5a5;">Time expired. Click Complete Payment to pay this ticket. The ticket will be removed only after payment succeeds.</div></div>`
          : "";
        const safeToken = String(token).replace(/'/g, "\\'");
        const paymentButton = paymentPending
          ? `<button class="btn btn-exit js-exit-pay" data-live-entry-ms="${entryMs}" style="${exitPayDisplay}" onclick="payPendingTicket('${safeToken}')"><i class="fas fa-credit-card"></i> Complete Payment</button>`
          : `<button class="btn btn-exit js-exit-pay" data-live-entry-ms="${entryMs}" style="${exitPayDisplay}" ${exitPayDisabled} onclick="goToExit('${safeToken}')"><i class="fas fa-door-open"></i> Exit & Pay</button>`;
        const cancelButton = paymentPending
          ? ""
          : `<button class="btn" style="background: linear-gradient(135deg, #6b7280, #4b5563); box-shadow: 0 14px 28px rgba(107, 114, 128, 0.18);" onclick="doCancel('${safeToken}')"><i class="fas fa-times-circle"></i> Cancel</button>`;
        const arrivedButton = paymentPending
          ? ""
          : `<button class="btn btn-arrived js-arrived-btn" data-ticket-token="${safeToken}" ${arrivalConfirmed || !arrivedEnabled ? "disabled" : ""} onclick="markTicketArrived('${safeToken}')"><i class="fas fa-location-dot"></i> Arrived</button>`;
        const arrivedHelper = paymentPending || !arrivedHint
          ? ""
          : `<div style="width:100%; color:rgba(255,255,255,0.58); font-size:0.8rem; margin-top:-4px;">${arrivedHint}</div>`;

        let rateHtml = `<div class="value">₹${standardRate}/hr</div>`;
        if (isPrime) {
          rateHtml = `<div class="value hi"><span style="text-decoration:line-through;color:var(--muted);font-size:0.75rem;font-weight:400;">₹${standardRate}/hr</span> <span style="color:var(--gold);">₹${rate}/hr</span></div>`;
        }

        return `
          <section class="ticket-card">
            <div class="ticket-head">
              <div>
                <div class="slot">#${ticket.slot || "--"}</div>
                <div class="token">${token}</div>
              </div>
              <div class="status" style="${statusStyle}">${statusLabel}</div>
            </div>
            <div class="fields">
              <div class="field"><div class="label">Vehicle</div><div class="value">${ticket.veh || ticket.vehicle || "--"}</div></div>
              <div class="field"><div class="label">Zone</div><div class="value">${zoneLabel}</div></div>
              <div class="field"><div class="label">Booking Date & Time</div><div class="value">${bookingLabel}</div></div>
              <div class="field"><div class="label">Parking Date & Time</div><div class="value">${parkInLabel}</div></div>
              <div class="field"><div class="label">Arrived Time</div><div class="value">${arrivedAtLabel}</div></div>
              <div class="field"><div class="label">Parking Duration</div><div class="value">${duration}</div></div>
              <div class="field"><div class="label">Live Parking Duration</div><div class="value js-live-parking-duration" data-live-entry-ms="${entryMs}" data-live-static="${paymentPending ? "1" : "0"}">${liveDuration}</div></div>
              <div class="field"><div class="label">Rate/HR</div>${rateHtml}</div>
              <div class="field"><div class="label">Est. Bill</div><div class="value hi js-live-bill" data-live-entry-ms="${entryMs}" data-live-hourly-rate="${rate}" data-live-static="${paymentPending ? "1" : "0"}">₹${bill}</div></div>
              <div class="field"><div class="label">Type</div><div class="value" style="color: var(--green);">${type}</div></div>
              ${paymentPending ? "" : getArrivalPanelHtml(ticket)}
              ${paymentInfo}
            </div>
            <div class="actions">
              ${paymentButton}
              ${cancelButton}
              ${arrivedButton}
              ${arrivedHelper}
              <button class="btn btn-photo" onclick="openPhoto('${safeToken}')"><i class="fas fa-image"></i> Ticket Photo</button>
            </div>
          </section>
        `;
      }

      window.goToExit = goToExit;
      window.openPhoto = openPhoto;
      window.payPendingTicket = payPendingTicket;
      window.closeExitPayModal = closeExitPayModal;
      window.confirmExitPay = confirmExitPay;

      window.doCancel = async function(token) {
        const tickets = loadTickets();
        const ticket = tickets.find(t => String(t.token || t.pnr) === String(token));
        if (!ticket) return;

        let bookingMs;
        try {
          bookingMs = getStoredBookingMs(ticket, true);
        } catch (error) {
          Swal.fire("Error", error.message, "error");
          return;
        }
        const cancellationMs = Date.now();
        const elapsedHrs = Math.max(0, (cancellationMs - bookingMs) / 3600000);
        const fee = getCancellationFee(bookingMs, cancellationMs);
        const feeLine = `Cancellation Fee: <b>&#8377;${fee}</b>`;
        const timeLine = `<small>Time from booking: ${elapsedHrs.toFixed(2)} hours</small>`;

        const result = await Swal.fire({
          title: 'Cancel Booking?',
          html: `${feeLine}<br>${timeLine}<br><br>This fee will be added to your pending dues.`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonText: 'Yes, Cancel',
          confirmButtonColor: '#ef4444',
          background: '#0d1117',
          color: '#fff'
        });

        if (!result.isConfirmed) return;
        executeCancellation(ticket, fee);
      };

      async function executeCancellation(ticket, fee) {
        try {
          const userRaw = localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "{}";
          const user = JSON.parse(userRaw !== "null" ? userRaw : "{}");
          const userId = user.id || localStorage.getItem("pm_user_id");

          const res = await fetch("api.php?action=cancel_ticket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: userId,
              ticket_id: ticket.id,
              booking_time: ticket.booking_time
            }),
          });
          const data = await res.json();
          if (data.status === "success") {
            const deductedFee = parseFloat(data.fee ?? fee) || fee;
            user.balance = parseFloat(data.new_balance ?? user.balance) || 0;
            user.pending_due = (user.pending_due || 0) + deductedFee;
            localStorage.setItem("pmCurrentUser", JSON.stringify(user));
            localStorage.setItem("currentUser", JSON.stringify(user));
            localStorage.removeItem('selected_slot_id');
            localStorage.removeItem('pending_slot_id');
            Swal.fire("Cancelled", `Booking cancelled. Cancellation Fee: &#8377;${deductedFee} added to pending dues.`, "success").then(() => { window.location.reload(); });
          } else {
            throw new Error(data.error || "Cancellation failed");
          }
        } catch (e) {
          Swal.fire("Error", e.message, "error");
        }
      }

      async function cancelForArrival(ticket, reason, successMessage) {
        const userId = getCurrentUserId();
        if (!ticket?.id || !userId) throw new Error("Ticket or user session missing.");
        const data = await postTicketAction("cancel_ticket_for_arrival", {
          user_id: userId,
          ticket_id: ticket.id,
          reason: reason || "arrival_declined"
        });

        try {
          const userRaw = localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "{}";
          const user = JSON.parse(userRaw !== "null" ? userRaw : "{}");
          user.balance = parseFloat(data.new_balance ?? user.balance) || 0;
          localStorage.setItem("pmCurrentUser", JSON.stringify(user));
          localStorage.setItem("currentUser", JSON.stringify(user));
        } catch { }
        localStorage.removeItem('selected_slot_id');
        localStorage.removeItem('pending_slot_id');

        await fetchTickets();
        await Swal.fire("Cancelled", successMessage, "success");
      }

      window.markTicketArrived = async function(token) {
        const tickets = loadTickets();
        const ticket = tickets.find((t) => String(t.token || t.pnr) === String(token));
        if (!ticket) return;
        if (isArrivalConfirmed(ticket)) {
          Swal.fire("Arrived", "You have already marked this booking as arrived.", "success");
          return;
        }
        if (!canMarkArrivedNow(ticket)) {
          Swal.fire("Too Early", "You can mark Arrived only within 10 minutes before your scheduled parking time.", "info");
          return;
        }

        try {
          const userId = getCurrentUserId();
          const data = await postTicketAction("mark_arrived", {
            user_id: userId,
            ticket_id: ticket.id
          });
          mergeTicketUpdate(getTicketKey(ticket), {
            arrival_status: "arrived",
            arrival_confirmed_at: data.arrival_confirmed_at || new Date().toISOString(),
            arrival_grace_expires_at: null,
            expected_exit_at: data.expected_exit_at || ticket.expected_exit_at || null
          });
          renderTickets(loadTickets());
          await Swal.fire("Success", data.message || "You have successfully arrived at the parking slot.", "success");
          fetchTickets();
        } catch (error) {
          Swal.fire("Error", error.message || "Unable to mark arrival.", "error");
        }
      };

      window.closeWalletModal = closeWalletModal;
      window.setWmAmount = setWmAmount;
      window.processWalletAdd = processWalletAdd;

      function renderTickets(ticketsList) {
        if (!Array.isArray(ticketsList)) ticketsList = [];
        const activeCount = ticketsList.filter((t) => !isPendingExpiredTicket(t)).length;
        const pendingCount = ticketsList.filter((t) => isPendingExpiredTicket(t)).length;
        document.getElementById("ticketCountBadge").textContent = pendingCount > 0
          ? `${activeCount} ACTIVE • ${pendingCount} PENDING`
          : `${activeCount} ACTIVE`;
        document.getElementById("ticketsGrid").innerHTML = ticketsList.length
          ? ticketsList.map(buildCard).join("")
          : `<div class="empty"><i class="fas fa-ticket-alt" style="font-size:2rem;display:block;margin-bottom:14px;opacity:0.32;"></i>No active tickets right now.</div>`;
        startLiveTimerLoop();
      }

      let liveTimerIntervalId = null;
      let liveTimerAlignTimeoutId = null;

      function updateAllLiveFields() {
        const now = Date.now();

        document.querySelectorAll(".js-exit-pay[data-live-entry-ms]").forEach((el) => {
          if (/Complete Payment/i.test(el.textContent || "")) {
            el.disabled = false;
            el.style.display = "";
            return;
          }
          const entryMs = Number(el.dataset.liveEntryMs);
          const shouldShow = isFinite(entryMs) && now >= entryMs;
          el.disabled = !shouldShow;
          el.style.display = shouldShow ? "" : "none";
        });

        document.querySelectorAll(".js-live-parking-duration[data-live-entry-ms]").forEach((el) => {
          if (el.dataset.liveStatic === "1") return;
          const entryMs = Number(el.dataset.liveEntryMs);
          if (!isFinite(entryMs)) {
            el.textContent = "Starts when you tap Arrived";
            return;
          }
          el.textContent = getLiveParkingDurationLabel(entryMs, now);
        });

        document.querySelectorAll(".js-live-bill[data-live-entry-ms][data-live-hourly-rate]").forEach((el) => {
          if (el.dataset.liveStatic === "1") return;
          const entryMs = Number(el.dataset.liveEntryMs);
          const hourlyRate = Number(el.dataset.liveHourlyRate);
          if (!isFinite(entryMs) || !isFinite(hourlyRate)) {
            el.textContent = "₹0";
            return;
          }
          if (now < entryMs) {
            el.textContent = "₹0";
            return;
          }

          const elapsedMs = Math.max(0, now - entryMs);
          const totalMins = Math.floor(elapsedMs / 60000);
          const elapsedHours = elapsedMs / 3600000;
          let bill;
          if (totalMins < 1) bill = Math.ceil(hourlyRate / 60);
          else if (elapsedHours < 1) bill = Math.ceil(totalMins * (hourlyRate / 60));
          else bill = Math.round(hourlyRate * elapsedHours);
          el.textContent = "₹" + bill;
        });
        const tickets = loadTickets();
        document.querySelectorAll(".js-arrived-btn[data-ticket-token]").forEach((el) => {
          const token = String(el.dataset.ticketToken || "");
          const ticket = tickets.find((item) => String(item.token || item.pnr) === token);
          if (!ticket || isArrivalConfirmed(ticket) || isPendingExpiredTicket(ticket)) return;
          el.disabled = !canMarkArrivedNow(ticket, now);
        });
        document.querySelectorAll(".js-arrival-status[data-ticket-key]").forEach((el) => {
          const key = String(el.dataset.ticketKey || "");
          const ticket = tickets.find((item) => getTicketKey(item) === key);
          if (!ticket) return;
          el.textContent = getArrivalPromptState(ticket, now).label;
        });
      }

      function startLiveTimerLoop() {
        if (liveTimerIntervalId) {
          clearInterval(liveTimerIntervalId);
          liveTimerIntervalId = null;
        }
        if (liveTimerAlignTimeoutId) {
          clearTimeout(liveTimerAlignTimeoutId);
          liveTimerAlignTimeoutId = null;
        }

        updateAllLiveFields();

        // Align updates to the next second tick so the timer feels "live".
        const msToNextSecond = 1000 - (Date.now() % 1000) + 20;
        liveTimerAlignTimeoutId = setTimeout(() => {
          updateAllLiveFields();
          runTicketLifecycleChecks(Date.now());
          liveTimerIntervalId = setInterval(() => {
            updateAllLiveFields();
            runTicketLifecycleChecks(Date.now());
          }, 1000);
        }, msToNextSecond);
      }

      async function fetchServerTickets() {
        const userRaw = localStorage.getItem("pmCurrentUser") || localStorage.getItem("currentUser") || "{}";
        const user = JSON.parse(userRaw !== "null" ? userRaw : "{}");
        const userId = user.id || localStorage.getItem("pm_user_id");
        if (!userId) return;

        try {
          const res = await fetch(`api.php?action=get_user&id=${encodeURIComponent(userId)}`);
          const data = await res.json();
          const pendingServerTicket = data?.unpaidExpiredTicket
            ? {
                ...data.unpaidExpiredTicket,
                status: "expired",
                payment_required: true,
                pending_payment: true,
                locked_amount: Number(data.unpaidExpiredTicket.locked_amount || data.unpaidExpiredTicket.amount || 0),
                locked_cashback: Number(data.unpaidExpiredTicket.locked_cashback || data.unpaidExpiredTicket.cashback || 0)
              }
            : null;
          if (data?.unpaidExpiredTicket) {
            restoreLockedPaymentIfAny(data.unpaidExpiredTicket);
          } else {
            clearPaymentLock();
            setMandatoryPaymentMode(false);
          }
          maybeShowArrivalNoResponseNotice(data?.recentArrivalNoResponseCancellation || null);
          if (data && Array.isArray(data.activeTickets)) {
            let serverTickets = data.activeTickets;

            // Safety: if server still returns expired tickets, drop them locally and free slots.
            const nowMs = Date.now();
            const expiredFromServer = [];
            serverTickets = serverTickets.filter(t => {
              try {
                const entryMs = getTicketParkingStartMs(t);
                if (!isFinite(entryMs)) return true;
                const endMs = entryMs + (getBookedDurationHours(t) * 3600000);
                if (nowMs >= endMs) {
                  expiredFromServer.push(t);
                  return false;
                }
                return true;
              } catch {
                return true;
              }
            });

            if (expiredFromServer.length) {
              const toFree = new Set(expiredFromServer.map(t => Number(t?.slot)).filter(n => isFinite(n)));
              let bookedSlots = [];
              try { bookedSlots = JSON.parse(localStorage.getItem("bookedSlots") || "[]") || []; } catch { }
              bookedSlots = (Array.isArray(bookedSlots) ? bookedSlots : []).map(Number).filter(slot => !toFree.has(Number(slot)));
              localStorage.setItem("bookedSlots", JSON.stringify(bookedSlots));
            }
            const serverActiveIds = new Set(serverTickets.map(t => String(t.id)));
            
            // Combine local and server tickets to prevent erasing un-synced bookings
            let localTickets = loadTickets();
            const validLocal = localTickets.filter(t => {
                if (t.id && !serverActiveIds.has(String(t.id))) return false;
                return true;
            });

            // Preserve local timestamp & formatting strings when syncing from server
            const merged = serverTickets.map(st => {
                const localMatch = validLocal.find(lt => String(lt.token || lt.pnr) === String(st.token || st.pnr));
                if (localMatch) {
                    return {
                      ...st,
                      timeStr: localMatch.timeStr || st.timeStr,
                      fullDate: localMatch.fullDate || st.fullDate,
                      timestamp: localMatch.timestamp || st.timestamp,
                      duration_minutes: localMatch.duration_minutes || st.duration_minutes,
                      duration_label: localMatch.duration_label || st.duration_label
                    };
                }
                return st;
            });
            const serverTokens = new Set(serverTickets.map(t => String(t.token || t.pnr)));
            validLocal.forEach(t => {
                if (!serverTokens.has(String(t.token || t.pnr))) merged.push(t);
            });
            const pendingLocal = loadTickets().filter((t) => isPendingExpiredTicket(t));
            pendingLocal.forEach((t) => {
                const key = getTicketKey(t);
                if (!merged.some((m) => getTicketKey(m) === key)) merged.push(t);
            });
            if (pendingServerTicket) {
                const key = getTicketKey(pendingServerTicket);
                if (!merged.some((m) => getTicketKey(m) === key)) merged.unshift(pendingServerTicket);
            }

            localStorage.setItem("pm_active_tickets", JSON.stringify(merged));
            localStorage.setItem(`pm_active_tickets_${userId}`, JSON.stringify(merged));
            if (merged.length > 0) {
                localStorage.setItem("activeTicket", JSON.stringify(merged[0]));
            } else {
                localStorage.removeItem("activeTicket");
            }
            renderTickets(merged);
          }
        } catch (e) {
          console.error("Failed to sync tickets from server", e);
        }
      }

      let tickets = loadTickets();
      renderTickets(tickets);
      const exitPayModal = document.getElementById("exitPayModal");
      const walletModal = document.getElementById("walletModal");
      [exitPayModal, walletModal].forEach((modal) => {
        if (!modal) return;
        modal.addEventListener("pointerdown", () => {
          requestPaymentFullscreenNow();
        }, true);
      });
      const dashboardBtn = document.querySelector(".back-btn");
      if (dashboardBtn) {
        dashboardBtn.addEventListener("click", (event) => {
          const hasPendingPayment = mandatoryPaymentActive || !!loadPaymentLock() || loadTickets().some((t) => isPendingExpiredTicket(t));
          if (!hasPendingPayment) return;
          event.preventDefault();
          const lock = loadPaymentLock();
          Swal.fire("Payment Pending", `Previous expired ticket payment is incomplete${lock?.ticket?.slot ? ` for Slot #${lock.ticket.slot}` : ""}. Complete payment first.`, "warning").then(() => {
            if (lock?.ticket) restoreLockedPaymentIfAny(lock.ticket);
          });
        });
      }
      
      // ═══════════════════════════════════════════════════════
      //   GLOBAL SESSION MANAGER (Multi-Device Kickout)
      // ═══════════════════════════════════════════════════════
      (function initGlobalSessionHeartbeat() {
          function checkGlobalSession() {
              const uid = localStorage.getItem("pm_user_id") || sessionStorage.getItem("pm_session_user");
              const tok = localStorage.getItem("pm_session_token");
              if (!uid || !tok) return;
              fetch("api.php?action=heartbeat", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ user_id: uid, session_token: tok })
              })
              .then(r => r.json())
              .then(data => {
                  if (data && data.valid === false) {
                      const keys = ["pm_user_id", "pm_session_token", "pm_device_id", "pm_last_active", "pmCurrentUser", "currentUser", "activeTicket", "pm_active_tickets", "pm_active_ticket_selected", "bookedSlots", "admin_records", "parkmate_booking_sync", "pm_ticket_banner_snapshot", "pm_session_user", "currentUserId"];
                      keys.forEach(k => { localStorage.removeItem(k); sessionStorage.removeItem(k); });
                      Object.keys(localStorage).forEach(k => { if (k.startsWith("pm_active_ticket")) localStorage.removeItem(k); });
                      const msg = data.reason === "device_conflict" ? "This account is active on another device. You have been signed out here." : "Your session has expired or you signed in elsewhere.";
                      if (window.Swal) {
                      window.Swal.fire({ title: "Session Ended", text: msg, icon: "info", showConfirmButton: false, timer: 2000, background: "#0d1117", color: "#ffffff" }).then(() => { window.location.replace("index.html"); });
                      } else {
                      window.location.replace("index.html");
                      }
                  }
              }).catch(()=>{});
          }
          setInterval(checkGlobalSession, 15000);
          document.addEventListener("visibilitychange", () => { if (!document.hidden) checkGlobalSession(); });
          window.addEventListener("focus", checkGlobalSession);
          setTimeout(checkGlobalSession, 2000);
      })();

      window.onload = async function () {
        const hasPersistentPaymentLock = localStorage.getItem(PAYMENT_MODE_LOCK_KEY) === "true";
        const lock = loadPaymentLock();
        if (hasPersistentPaymentLock && lock?.ticket) {
          restoreLockedPaymentIfAny(lock.ticket);
        } else if (mandatoryPaymentActive) {
          startPaymentMode();
        }
        await fetchServerTickets();
        await fetchTickets(); // Ensure the latest detailed ticket payload is fully loaded
        
        // Add a slight delay to guarantee the DOM updates are painted before hiding the loader
        setTimeout(() => {
          document.body.classList.remove("page-loading");
          const loader = document.getElementById("pageLoader");
          if (loader) loader.classList.add("hidden");
        }, 450);
        
        setInterval(fetchTickets, 2000);
      };
      restoreLockedPaymentIfAny();
    })();
  </script>
</body>
</html>
